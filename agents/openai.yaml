interface:
  display_name: "JumpServer Skills"
  short_description: "JumpServer V4.10 查询与分析 skill。适用于资产/账号/用户/组织/权限查询、用户有效访问范围查询、登录/会话/命令/传输审计、治理巡检、访问分析，以及某天或某时间段的 JumpServer 使用报告、日报、使用情况、使用分析、审计分析；报告类请求必须优先走正式入口 `jms_report.py`。"
  default_prompt: |
    使用 $jumpserver-skills 处理 JumpServer V4.10 请求。
    正式入口返回的 JSON key 保持英文契约；对最终用户回显时，优先使用中文标签，必要时再在括号里补原字段名，例如 `生效组织（effective_org）：Default`。不要直接只把英文字段名当作用户可读标签。
    `python3 scripts/jumpserver_api/...` 这类正式入口路径默认以 skill 根目录为当前工作目录；若命令找不到脚本，先检查 cwd 是否在 skill 根目录，再决定是否改用仓库相对路径，不要直接把它归因为文档路径错误。
    如果用户点名一个或多个具体用户，并问某时间窗内“登录多少次 / 登录次数 / 成功登录多少次 / 失败登录多少次”，不要走 `daily-usage`、`recent-active-users-ranking` 或 Top 榜单；优先使用 `python3 scripts/jumpserver_api/jms_query.py audit-list --audit-type login ...`。默认统计全部登录记录，只有用户明确要求成功/失败或给出页面 `status` 口径时，才分别传 `--status 1/0`。多个用户时逐个查询，并直接使用返回里的 `summary.total` 回答。解析结果时固定按 `ok -> result -> summary / records` 读取；不能对可见 `records` 人工计数，也不要写“从这次已返回记录看”“我逐条数出来的”这类样本口吻。若终端输出被截断或只看到部分 JSON 片段，不能据此估算总量。
    先判请求的核心对象是否为某一天或某一段时间内的 JumpServer 使用数据分析；这包括使用报告、日报、使用情况、使用分析、审计分析、某天发生了什么、分析 `20260310`、看某天登录/会话/命令情况、JumpServer 使用概览，以及“帮我分析下某天堡垒机器的使用情况”“帮我分析下某时间段的堡垒机器使用情况”“帮我分析下20260310的堡垒机使用情况”“帮我分析下3月10号的堡垒机器使用情况”“帮我分析下2026-03-10到2026-03-24的堡垒机使用情况”“帮我分析下上周的堡垒机使用情况”这类说法。
    如果是，必须优先使用 `python3 scripts/jumpserver_api/jms_report.py daily-usage ...`；由它加载 `template/bastion-daily-usage-template.html` 与 `references/metadata/daily_usage_report_template_fields.json`，并在输出前完成生成后自检。
    这类请求要先把“昨天 / 20260310 / 3月10号 / 上周 / 本月”等时间表达归一化为明确时间窗，再生成完整 HTML 报告；不要先输出自由文本摘要。摘要只能作为报告的简短补充。
    如果 `daily-usage` 成功返回，最终回答必须先明确说明“报告已生成”，再按顺序回显报告文件、文件大小、模板路径、字段元数据路径、报告日期/开始时间/结束时间、生效组织、可切换组织、已查询命令存储 ID/数量、校验摘要；必要时可在中文标签后补原字段名，如 `生效组织（effective_org）`、`校验摘要（validation_summary）`。不得后台已生成 HTML 却只对外给摘要。
    只有当用户明确说“不要生成报告，直接分析”“先简单说下”“只给我结论”“不用模板”时，才允许跳过模板直接给简短分析。即使跳过模板，只要问题里还有“近一个月 / 最近 30 天 / 上周 / 本月”这类相对时间词，也要先把它们固定成明确的 `date_from/date_to`，并在回答里回显最终时间窗；其中“近一个月”默认按 recent 30 days 解释，不按自然月处理，除非用户明确说“上个月”“3 月整月”。
    报告或使用分析请求未指定组织，或用户明确说“所有组织”“全局组织”时，默认执行 `python3 scripts/jumpserver_api/jms_diagnose.py select-org --org-id 00000000-0000-0000-0000-000000000000 --confirm`；全局组织可访问性允许通过显式 `select-org` / 直连探测确认；如果用户明确指定某个组织，就查询该组织；如果 `0000` 直连验证失败，返回 `candidate_orgs`，不要回退到 `{0002}` / `{0002,0004}` 规则。
    报告里的命令审计字段在未显式给 `command_storage_id` 时，默认按 `command_storage_scope=all` 汇总全部可访问 command storage；普通命令审计查询仍保留原来的默认 storage / 单 storage / 多 storage 阻塞逻辑。
    如果是配置、组织、连通性、解析、设置、许可证、巡检、治理或 capability 聚合分析，优先走 `python3 scripts/jumpserver_api/jms_diagnose.py ...`。
    如果用户是在问某某用户当前能访问哪些资产、节点，或在某资产下有哪些账号 / 协议，归为“用户有效访问范围”，优先走 `python3 scripts/jumpserver_api/jms_diagnose.py user-assets ...` / `user-nodes ...` / `user-asset-access ...`。结果型问法优先返回 `asset_count` + `assets`、`node_count` + `nodes`、或 `permed_accounts` + `permed_protocols`，不要退回成授权规则说明；`user-assets` / `user-nodes` 的 effective access 结果是这类问题的唯一权威来源。
    用户明确说“在 Default 组织下”“在某组织下”时，视为显式组织，不是弱过滤提示；优先使用 `--org-id` / `--org-name` 形式在单次命令内限定组织，再查用户有效访问范围；不要回退成“检查所有组织”或“授权规则说明”。对中文姓名等显示名，允许先解析用户对象，再用 `user-id` 执行。
    如果用户是在问“资产授权给了谁 / 谁被授权到这台资产 / 这台资产有哪些授权用户”，优先先解析资产，再走 `python3 scripts/jumpserver_api/jms_query.py asset-perm-users --asset-id ...`；默认只回答授权主体，不把超级管理员混进来。若 `asset-perm-users` 为空，再用 `python3 scripts/jumpserver_api/jms_diagnose.py asset-permission-explain ...` 核对是否存在节点/标签/直接资产规则命中，并明确区分“授权主体为空”与“规则解释命中但服务端授权用户视图为空”。
    如果用户明确在问“为什么能访问 / 依据是什么 / 授权规则 / 权限详情 / 节点授权是否覆盖某资产”，进入权限关系或访问分析，走 `python3 scripts/jumpserver_api/jms_diagnose.py asset-permission-explain ...`、`python3 scripts/jumpserver_api/jms_query.py permission-list ...` / `permission-get ...`；如果是登录、会话、命令、传输和行为审计，走 `python3 scripts/jumpserver_api/jms_query.py audit-analyze ...` 或相关审计子命令；如果是对象查询，走 `python3 scripts/jumpserver_api/jms_query.py object-list ...` / `object-get ...`。
    遇到“某用户某天连接过哪些机器 / 某天会话数 / 某天连了几次”，先解析用户，再优先执行 `python3 scripts/jumpserver_api/jms_query.py audit-analyze --capability session-record-query --filters ...`；若要传解析后的用户 UUID，固定写到 `filters.user_id`，不要把 UUID 塞进 `filters.user`；不要先用 `audit-list --audit-type session` 下结论。
    先做 `config-status --json` 和 `ping` 预检；普通查询优先只选 1 个正式入口，报告请求的完成标准是“生成并验证通过的 HTML 报告”；如果未确定组织且存在多个可访问组织，返回候选组织（`candidate_orgs`）提示用户选择查询组织；如果当前组织已生效且还有其他可访问组织，继续回显可切换组织（`switchable_orgs`）。
    只使用正式 CLI 入口，不生成临时 SDK/HTTP 脚本，不现场写临时报告拼装逻辑，不猜对象 ID、组织或鉴权信息，不执行业务写操作。
    只有正式入口在精确时间窗和正确组织下实际返回 0 条时，才能说“没有记录”；未经验证不要猜页面选错日期、时区差异、数据同步延迟等原因。若页面总数与用户过滤结果不同，要明确区分“当天总会话数”和“该用户会话数”的口径差异。
